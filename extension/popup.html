<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=350">
  <title>LLM-to-API Bridge</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <h1 class="header__title">LLM-to-API Bridge</h1>
    <div class="header__status" id="status-badge">
      <span class="status-dot" id="status-dot"></span>
      <span class="status-text" id="status-text">Checking…</span>
    </div>
  </header>

  <!-- Tab Linking -->
  <section class="section">
    <h2 class="section__title">Global Target</h2>
    <div id="link-status" class="link-status">
      <p id="linked-tab-text">No tab linked</p>
      <button class="btn btn--primary" id="btn-link-tab" title="Link this extension to the current active tab">🔗 Calibrate & Link Current Tab</button>
    </div>
  </section>

  <!-- Server Info -->
  <section class="section">
    <div class="info-row">
      <span class="info-label">Server</span>
      <span class="info-value" id="server-url">ws://localhost:8000/ws</span>
    </div>
    <div class="info-row">
      <span class="info-label">Last connected</span>
      <span class="info-value" id="last-connected">—</span>
    </div>
  </section>

  <!-- Cached Domains -->
  <section class="section">
    <div class="section__header">
      <h2 class="section__title">Cached Domains</h2>
      <button class="btn btn--small btn--danger" id="btn-clear-all" title="Clear all cached selectors">Clear All</button>
    </div>
    <div id="domains-list" class="domains-list">
      <p class="empty-state">No cached domains</p>
    </div>
  </section>

  <!-- Recent Requests -->
  <section class="section">
    <h2 class="section__title">Recent Requests</h2>
    <div id="requests-list" class="requests-list">
      <p class="empty-state">No recent requests</p>
    </div>
  </section>

  <script src="popup.js"></script>
</body>
</html>
